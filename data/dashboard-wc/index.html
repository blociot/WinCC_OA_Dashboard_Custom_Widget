    <script>
      (function() {
        var origConnected = HTMLTextAreaElement.prototype.connectedCallback;
        var desc = Object.getOwnPropertyDescriptor(HTMLElement.prototype, 'style');
        var origAppend = Node.prototype.appendChild;
        Node.prototype.appendChild = function(child) {
          var result = origAppend.call(this, child);
          if (child && child.tagName === 'TEXTAREA') {
            child.style.setProperty('height', '480px', 'important');
            child.style.setProperty('width', '100%', 'important');
            child.style.setProperty('min-height', '480px', 'important');
            child.style.setProperty('font-family', 'monospace', 'important');
            child.style.setProperty('font-size', '13px', 'important');
            child.style.setProperty('line-height', '1.4', 'important');
            child.style.setProperty('white-space', 'pre', 'important');
            child.style.setProperty('resize', 'vertical', 'important');
            child.rows = 20;
            function fixParents() {
              var p = child.parentNode;
              while (p) {
                if (p.style) {
                  p.style.setProperty('width', '100%', 'important');
                  p.style.setProperty('max-width', '100%', 'important');
                }
                if (p.parentNode) {
                  p = p.parentNode;
                } else if (p.host) {
                  p = p.host;
                } else {
                  break;
                }
              }
            }
            fixParents();
            setTimeout(fixParents, 50);
            setTimeout(fixParents, 200);
          }
          return result;
        };
      })();
    </script>
